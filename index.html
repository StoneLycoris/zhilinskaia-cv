<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Zhilinskaia Elena frontend</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (function () {
        try {
          const saved = localStorage.getItem("theme");
          const theme = saved === "light" || saved === "dark" ? saved : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </body>
</html>
